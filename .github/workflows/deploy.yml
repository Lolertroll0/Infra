name: Deploy Infra

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.9
          cli_config_credentials_token: ${{ secrets.TERRAFORM_API_TOKEN }}

      # 1. Connect to your Tailnet to access private nodes
      - name: Connect to Tailnet
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_CI_AUTH_KEY }}

      # 2. Configure SSH Keys for your distributed nodes
      - name: Configure SSH Keys
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{ secrets.PROXMOX_SSH_KEY }}
            ${{ secrets.RP4_SSH_KEY }}
            ${{ secrets.MAIN_SERVER_SSH_KEY }}
            ${{ secrets.VOICE_SSH_KEY }}

      # 2.1 Provision SSH Key files for Terraform provider (needed for -i flag)
      - name: Provision SSH Key Files
        run: |
          echo "${{ secrets.RP4_SSH_KEY }}" > /tmp/rp4_key
          echo "${{ secrets.VOICE_SSH_KEY }}" > /tmp/voice_key
          echo "${{ secrets.MAIN_SERVER_SSH_KEY }}" > /tmp/main_key

          chmod 600 /tmp/rp4_key /tmp/voice_key /tmp/main_key

      # 3. Terraform Operations
      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve 2>&1 | tee apply.log
        env:
          TF_VAR_mainServer: ${{ secrets.MAIN_SERVER_URL }}
          TF_VAR_orchestrator: ${{ secrets.ORCHESTRATOR_URL }}
          TF_VAR_voicePipeline: ${{ secrets.VOICE_PIPELINE_URL }}

          TF_VAR_adminUser: ${{ secrets.ADMIN_USER }}
          TF_VAR_adminEmail: ${{ secrets.ADMIN_EMAIL }}

          TF_VAR_tailscaleSecret: ${{ secrets.TAILSCALE_API_KEY }}
          TF_VAR_tailnet: ${{ secrets.TAILNET }}

          TF_VAR_tailscaleRP4AuthKey: ${{ secrets.TAILSCALE_RP4_AUTH_KEY }}
          TF_VAR_tailscaleMainAuthKey: ${{ secrets.TAILSCALE_MAIN_AUTH_KEY }}
          TF_VAR_tailscaleVoiceAuthKey: ${{ secrets.TAILSCALE_VOICE_AUTH_KEY }}

          TF_VAR_rp4Key: "/tmp/rp4_key"
          TF_VAR_mainKey: "/tmp/main_key"
          TF_VAR_voiceKey: "/tmp/voice_key"

          TF_VAR_proxmoxAPI: ${{ secrets.PROXMOX_API_URL }}
          TF_VAR_proxmoxTokenId: ${{ secrets.PROXMOX_TOKEN_ID }}
          TF_VAR_proxmoxSecret: ${{ secrets.PROXMOX_SECRET }}

          # TODO: Add HAOS and EZBK Template IDs
          # TF_VAR_haosTemplate: ""
          # TF_VAR_ezbkTemplate: ""

      - name: Capture Failure Logs
        if: failure()
        run: |
          tail -n 500 apply.log > error_log.txt
          {
            echo 'TF_APPLY_ERROR<<EOF'
            tail -n 20 error_log.txt
            echo 'EOF'
          } >> "$GITHUB_ENV"

      - name: Upload Error Log
        id: artifact-upload
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-error-log
          path: error_log.txt

      # 4. Observability: Send success message to Discord
      - name: Send success message to discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

        if: success()
        uses: Ilshidur/action-discord@0.4.0
        with:
          args: "Changes deployed on the infrastructure successfully."

      - name: Send failure message to discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

        if: failure()
        uses: Ilshidur/action-discord@v4
        with:
          args: |
            **Infrastructure Deployment FAILED** ❌
            [View Full Error Log](${{ steps.artifact-upload.outputs.artifact-url }})

      # 5. Logout from Tailnet
      - name: logout from tailnet
        run: tailscale logout
